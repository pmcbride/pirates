<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Cook — blond mop covering one eye, curly brow, sharp suit. -->
  <circle cx="64" cy="64" r="58" fill="#d8e7f3" stroke="#2b1d0e" stroke-width="5"/>
  <!-- suit shoulders at the badge base -->
  <ellipse cx="64" cy="118" rx="32" ry="16" fill="#3c3a52" stroke="#2b1d0e" stroke-width="4"/>
  <!-- face -->
  <circle cx="64" cy="76" r="27" fill="#ffdcb0" stroke="#2b1d0e" stroke-width="4"/>
  <!-- blond hair: dome plus a panel hiding the right eye -->
  <ellipse cx="63" cy="56" rx="28" ry="16" fill="#f4c95d" stroke="#2b1d0e" stroke-width="4"/>
  <ellipse cx="80" cy="70" rx="13" ry="18" fill="#f4c95d" stroke="#2b1d0e" stroke-width="4"/>
  <!-- signature curly eyebrow over the visible eye -->
  <path d="M44 67 Q51 61 57 66 Q54 69 51 66.5" stroke="#2b1d0e" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <!-- visible eye -->
  <circle cx="52" cy="75" r="3.2" fill="#2b1d0e"/>
  <!-- cool little smile -->
  <path d="M50 90 Q58 95 66 91" stroke="#2b1d0e" stroke-width="3.2" stroke-linecap="round" fill="none"/>
</svg>
