<svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <!-- Marine patrol skiff — stern little navy boat, kid-friendly menace. -->
  <ellipse cx="48" cy="85" rx="34" ry="6.5" fill="#2b1d0e" opacity="0.16"/>
  <!-- Mast + pennant -->
  <line x1="52" y1="12" x2="52" y2="58" stroke="#2b1d0e" stroke-width="5" stroke-linecap="round"/>
  <path d="M52 12l17 5.5L52 23z" fill="#c4391c" stroke="#2b1d0e" stroke-width="3" stroke-linejoin="round"/>
  <!-- Sail, bellied to the left, with navy chevron emblem -->
  <path d="M49 18Q22 26 27 52q14-6 22-3z" fill="#fff1cf" stroke="#2b1d0e" stroke-width="4" stroke-linejoin="round"/>
  <path d="M33 36l5 4.5 5-4.5M33 44l5 4.5 5-4.5" fill="none" stroke="#3c6e91" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Hull -->
  <path d="M14 58q34 13 68 0l-9 17q-25 7-50 0z" fill="#3c6e91" stroke="#2b1d0e" stroke-width="5" stroke-linejoin="round"/>
  <path d="M20 64q28 9 56 0" fill="none" stroke="#1d6f9f" stroke-width="4" stroke-linecap="round"/>
  <!-- Porthole eyes give it a face without being scary -->
  <circle cx="38" cy="66" r="3" fill="#fff1cf" stroke="#2b1d0e" stroke-width="2"/>
  <circle cx="58" cy="66" r="3" fill="#fff1cf" stroke="#2b1d0e" stroke-width="2"/>
  <!-- Bow foam -->
  <path d="M10 70q4-3 8 0M78 70q4-3 8 0" fill="none" stroke="#d6f3f8" stroke-width="3.5" stroke-linecap="round"/>
</svg>
