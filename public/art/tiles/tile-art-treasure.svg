<svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <!-- Open treasure chest, shōnen ink-outline cel style. -->
  <ellipse cx="48" cy="85" rx="33" ry="6.5" fill="#2b1d0e" opacity="0.16"/>
  <!-- Lid, flipped open behind the body -->
  <path d="M24 40q0-24 24-24t24 24v4H24z" fill="#c07c42" stroke="#2b1d0e" stroke-width="5" stroke-linejoin="round"/>
  <path d="M30 38q0-16 18-16t18 16" fill="none" stroke="#2b1d0e" stroke-width="3" opacity="0.35"/>
  <!-- Gold pile peeking over the rim -->
  <circle cx="38" cy="44" r="8" fill="#ffc94a" stroke="#2b1d0e" stroke-width="3.5"/>
  <circle cx="58" cy="44" r="8" fill="#ffc94a" stroke="#2b1d0e" stroke-width="3.5"/>
  <circle cx="48" cy="40" r="8.5" fill="#ffd97a" stroke="#2b1d0e" stroke-width="3.5"/>
  <!-- Chest body -->
  <rect x="22" y="48" width="52" height="32" rx="5" fill="#a9683a" stroke="#2b1d0e" stroke-width="5"/>
  <path d="M33 48v32M63 48v32" stroke="#2b1d0e" stroke-width="2.5" opacity="0.3"/>
  <!-- Gold lock plate -->
  <rect x="41" y="52" width="14" height="15" rx="4" fill="#ffc94a" stroke="#2b1d0e" stroke-width="3.5"/>
  <circle cx="48" cy="58" r="2.4" fill="#2b1d0e"/>
  <path d="M48 58v5" stroke="#2b1d0e" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Sparkles -->
  <path d="M22 28l2.4 5 5 2.4-5 2.4-2.4 5-2.4-5-5-2.4 5-2.4z" fill="#fff1cf" stroke="#2b1d0e" stroke-width="2"/>
  <path d="M75 32l1.9 4 4 1.9-4 1.9-1.9 4-1.9-4-4-1.9 4-1.9z" fill="#fff1cf" stroke="#2b1d0e" stroke-width="2"/>
</svg>
